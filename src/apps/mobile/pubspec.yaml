name: furnigo
description: Furnigo — furniture sourcing from Foshan to Australia
publish_to: 'none'
version: 0.0.1+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.0
  riverpod_annotation: ^2.6.0
  go_router: ^14.8.0
  dio: ^5.8.0
  socket_io_client: ^3.0.3
  flutter_secure_storage: ^9.2.0
  firebase_messaging: ^15.2.0
  firebase_core: ^3.14.0
  cached_network_image: ^3.4.0
  image_picker: ^1.1.0
  sqflite: ^2.4.2
  cupertino_icons: ^1.0.8
  timeago: ^3.7.1
  flutter_inappwebview: ^6.0.0
  flutter_dotenv: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - .env.prod
    - assets/images/
